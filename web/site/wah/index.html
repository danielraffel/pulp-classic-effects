<!doctype html>
<meta charset="utf-8">
<div id="app"></div>
<script type="module">
import { mountDemo } from "../player/pulp-player.js";
mountDemo({
  root: document.getElementById("app"),
  title: "Wah",
  subtitle: "A sweeping filter that opens and closes — the classic “wah” sound.",
  dspUrl: "./wam-dsp.js", processorUrl: "./wam-processor.js",
  mode: "audio-effect", paramRows: 3,
  // The plugin defaults Gain to +20 dB — the top of its 0..20 dB range — on a
  // resonant filter (Q defaults to 10). Musically defensible in a DAW where you
  // set your own level; far too loud to open a web page on. Start at unity.
  initialParams: { "Gain": 0 },
});
</script>
